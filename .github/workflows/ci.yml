name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build auth-service
        run: mvn -f auth-service/pom.xml clean install -DskipTests

      - name: Build task-service
        run: mvn -f task-service/pom.xml clean install -DskipTests

      - name: Build api-gateway
        run: mvn -f api-gateway/pom.xml clean install -DskipTests

      - name: Build service-registry
        run: mvn -f service-registry/pom.xml clean install -DskipTests

      - name: Build Docker images
        run: docker compose build --no-cache

      - name: Start services
        run: docker compose up -d

      - name: Wait before readiness checks
        run: sleep 60

      - name: Debug containers
        run: docker compose ps

      - name: Wait for Eureka
        run: |
          for i in $(seq 1 80); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8761/eureka/apps || echo "000")
            echo "Eureka status: $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs --no-color
          exit 1

      - name: Wait for services registration
        run: |
          for i in $(seq 1 60); do
            eureka=$(curl -s http://localhost:8761/eureka/apps || true)

            echo "$eureka" | grep -q "AUTH-SERVICE"
            auth=$?

            echo "$eureka" | grep -q "TASK-SERVICE"
            task=$?

            if [ $auth -eq 0 ] && [ $task -eq 0 ]; then
              exit 0
            fi

            sleep 5
          done
          docker compose logs --no-color
          exit 1

      - name: Wait for Gateway
        run: |
          for i in $(seq 1 50); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8090/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"test","password":"test"}' \
              || echo "000")

            echo "Gateway status: $status"

            if [ "$status" = "200" ] || [ "$status" = "400" ] || [ "$status" = "401" ]; then
              echo "Gateway ready"
              exit 0
            fi

            sleep 5
          done

          echo "Gateway NOT ready"
          docker compose logs --no-color
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: |
          newman run postman_collection.json \
            -e postman_environment.json \
            --env-var "baseUrl=http://localhost:8090"

      - name: Stop services
        run: docker compose down -v

      - name: Debug Docker images
        run: docker images

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker images
         if: github.ref == 'refs/heads/main'
        run: |
         docker push yash9912/task-manager-auth
         docker push yash9912/task-manager-task
         docker push yash9912/task-manager-gateway
          docker push yash9912/task-manager-registry
      - name: Verify Docker login
        run: docker info
