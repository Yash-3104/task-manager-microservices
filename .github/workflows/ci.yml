name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:

  # -------------------------
  # BUILD JARS (PARALLEL)
  # -------------------------
  build-jars:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - task-service
          - api-gateway
          - service-registry

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build ${{ matrix.service }}
        run: mvn -f ${{ matrix.service }}/pom.xml clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          if-no-files-found: error

  # -------------------------
  # INTEGRATION TESTS
  # -------------------------
  integration:
    runs-on: ubuntu-latest
    needs: build-jars

    steps:
      - uses: actions/checkout@v4

      # Download all JARs
      - uses: actions/download-artifact@v4
        with:
          name: auth-service-jar
          path: auth-service/target

      - uses: actions/download-artifact@v4
        with:
          name: task-service-jar
          path: task-service/target

      - uses: actions/download-artifact@v4
        with:
          name: api-gateway-jar
          path: api-gateway/target

      - uses: actions/download-artifact@v4
        with:
          name: service-registry-jar
          path: service-registry/target

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for Gateway
        run: |
          for i in $(seq 1 50); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8090/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"test","password":"test"}' \
              || echo "000")

            if [[ "$status" =~ ^(200|400|401)$ ]]; then
              echo "Gateway ready"
              exit 0
            fi

            sleep 5
          done

          docker compose logs --no-color
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install -g newman

      - name: Run Postman tests
        run: |
          newman run postman_collection.json \
            -e postman_environment.json \
            --env-var "baseUrl=http://localhost:8090"

      - name: Stop services
        run: docker compose down -v

  # -------------------------
  # PUSH DOCKER IMAGES
  # -------------------------
  push-images:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: auth-service-jar
          path: auth-service/target

      - uses: actions/download-artifact@v4
        with:
          name: task-service-jar
          path: task-service/target

      - uses: actions/download-artifact@v4
        with:
          name: api-gateway-jar
          path: api-gateway/target

      - uses: actions/download-artifact@v4
        with:
          name: service-registry-jar
          path: service-registry/target

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push images
        run: |
          docker build -t yash9912/task-manager-auth ./auth-service
          docker push yash9912/task-manager-auth

          docker build -t yash9912/task-manager-task ./task-service
          docker push yash9912/task-manager-task

          docker build -t yash9912/task-manager-gateway ./api-gateway
          docker push yash9912/task-manager-gateway

          docker build -t yash9912/task-manager-registry ./service-registry
          docker push yash9912/task-manager-registry

  # -------------------------
  # DEPLOY TO EC2
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: push-images
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/task-manager-microservices
            ./deploy.sh
