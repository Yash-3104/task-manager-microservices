name: CI/CD Pipeline

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:

  # 🔹 Build all services in parallel
  build-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, task-service, api-gateway, service-registry]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build ${{ matrix.service }}
        run: mvn -f ${{ matrix.service }}/pom.xml clean install -DskipTests


  # 🔹 Docker + Integration Tests
  integration-test:
    runs-on: ubuntu-latest
    needs: build-services

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images (WITH CACHE)
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 40   # reduced from 60

      - name: Wait for Eureka
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8761/eureka/apps || echo "000")
            echo "Eureka status: $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          docker compose logs
          exit 1

      - name: Wait for Gateway
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8090/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"test","password":"test"}' || echo "000")

            echo "Gateway status: $status"

            [[ "$status" == "200" || "$status" == "400" || "$status" == "401" ]] && exit 0
            sleep 3
          done
          docker compose logs
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install -g newman

      - name: Run Postman tests
        run: |
          newman run postman_collection.json \
            -e postman_environment.json \
            --env-var "baseUrl=http://localhost:8090"

      - name: Stop services
        run: docker compose down -v


  # 🔹 Push images (only on main)
  push-images:
    runs-on: ubuntu-latest
    needs: integration-test

    steps:
      - uses: actions/checkout@v4

      - name: Build images again (fast due to cache)
        run: docker compose build

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify login
        run: docker info | grep Username

      - name: Push images (with debug)
        run: |
          docker push yash9912/task-manager-auth:latest
          docker push yash9912/task-manager-task:latest
          docker push yash9912/task-manager-gateway:latest
          docker push yash9912/task-manager-registry:latest