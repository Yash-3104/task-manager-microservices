name: CI/CD Pipeline

on:
push:
branches:
- main
- feature/*
pull_request:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Cache Maven dependencies
    uses: actions/cache@v4
    with:
      path: ~/.m2
      key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

  # -------- BUILD --------

  - name: Build auth-service
    run: mvn -f auth-service/pom.xml clean install -DskipTests

  - name: Build task-service
    run: mvn -f task-service/pom.xml clean install -DskipTests

  - name: Build api-gateway
    run: mvn -f api-gateway/pom.xml clean install -DskipTests

  - name: Build service-registry
    run: mvn -f service-registry/pom.xml clean install -DskipTests

  # -------- DOCKER --------

  - name: Build Docker images
    run: docker compose build --no-cache

  - name: Start services
    run: docker compose up -d

  # -------- WAIT FOR SYSTEM --------

  - name: Wait for system readiness
    run: |
      echo "Waiting for system..."

      for i in $(seq 1 80); do
        status=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST http://localhost:8090/api/auth/login \
          -H "Content-Type: application/json" \
          -d '{"username":"test","password":"test"}' \
          || echo "000")

        echo "Gateway status: $status"

        if [ "$status" = "200" ] || [ "$status" = "400" ] || [ "$status" = "401" ]; then
          echo "System READY ✅"
          exit 0
        fi

        sleep 5
      done

      echo "System NOT ready ❌"
      docker compose logs --no-color
      exit 1

  # -------- TESTING --------

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 18

  - name: Install Newman
    run: npm install -g newman

  - name: Run Postman tests
    run: |
      newman run postman_collection.json \
        -e postman_environment.json \
        --env-var "baseUrl=http://localhost:8090"

  # -------- CLEANUP --------

  - name: Stop services
    run: docker compose down -v

  # -------- DOCKER PUSH (MAIN ONLY) --------

  - name: Login to DockerHub
    if: github.ref == 'refs/heads/main'
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Tag Docker images
    if: github.ref == 'refs/heads/main'
    run: |
      docker tag task-manager-microservices-auth-service yash9912/task-manager-auth:latest
      docker tag task-manager-microservices-task-service yash9912/task-manager-task:latest
      docker tag task-manager-microservices-api-gateway yash9912/task-manager-gateway:latest
      docker tag task-manager-microservices-service-registry yash9912/task-manager-registry:latest

  - name: Push Docker images
    if: github.ref == 'refs/heads/main'
    run: |
      docker push yash9912/task-manager-auth:latest
      docker push yash9912/task-manager-task:latest
      docker push yash9912/task-manager-gateway:latest
      docker push yash9912/task-manager-registry:latest
