name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  build-jars:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - task-service
          - api-gateway
          - service-registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build ${{ matrix.service }}
        run: mvn -f ${{ matrix.service }}/pom.xml clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          if-no-files-found: error

  integration:
    runs-on: ubuntu-latest
    needs: build-jars

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Download auth-service jar
        uses: actions/download-artifact@v4
        with:
          name: auth-service-jar
          path: auth-service/target

      - name: Download task-service jar
        uses: actions/download-artifact@v4
        with:
          name: task-service-jar
          path: task-service/target

      - name: Download api-gateway jar
        uses: actions/download-artifact@v4
        with:
          name: api-gateway-jar
          path: api-gateway/target

      - name: Download service-registry jar
        uses: actions/download-artifact@v4
        with:
          name: service-registry-jar
          path: service-registry/target

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait before readiness checks
        run: sleep 40

      - name: Wait for Gateway
        run: |
          for i in $(seq 1 50); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8090/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"test","password":"test"}' \
              || echo "000")

            echo "Gateway status: $status"

            if [ "$status" = "200" ] || [ "$status" = "400" ] || [ "$status" = "401" ]; then
              echo "Gateway ready"
              exit 0
            fi

            sleep 5
          done

          echo "Gateway NOT ready"
          docker compose logs --no-color
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: |
          newman run postman_collection.json \
            -e postman_environment.json \
            --env-var "baseUrl=http://localhost:8090"

      - name: Stop services
        run: docker compose down -v

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push images
        run: |
          docker push yash9912/task-manager-auth:latest
          docker push yash9912/task-manager-task:latest
          docker push yash9912/task-manager-gateway:latest
          docker push yash9912/task-manager-registry:latest