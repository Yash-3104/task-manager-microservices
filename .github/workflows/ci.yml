name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # ---------------- BUILD ----------------
      - name: Build services
        run: |
          mvn -f auth-service/pom.xml clean install -DskipTests
          mvn -f task-service/pom.xml clean install -DskipTests
          mvn -f api-gateway/pom.xml clean install -DskipTests
          mvn -f service-registry/pom.xml clean install -DskipTests

      - name: Build Docker images
        run: docker compose build --no-cache

      # ---------------- TEST ----------------
      - name: Start services
        run: docker compose up -d

      - name: Wait before readiness checks
        run: sleep 60

      - name: Debug containers
        run: docker compose ps

      - name: Wait for Eureka
        run: |
          for i in $(seq 1 80); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8761/eureka/apps || echo "000")
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          docker compose logs --no-color
          exit 1

      - name: Wait for Gateway
        run: |
          for i in $(seq 1 50); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8090/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"test","password":"test"}' \
              || echo "000")

            if [[ "$status" == "200" || "$status" == "400" || "$status" == "401" ]]; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs --no-color
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: |
          newman run postman_collection.json \
            -e postman_environment.json \
            --env-var "baseUrl=http://localhost:8090"

      - name: Stop services
        run: docker compose down -v

      # ---------------- PUSH FIX ----------------
      - name: List images (debug)
        run: docker images

      - name: Tag images explicitly
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag yash9912/task-manager-auth:latest yash9912/task-manager-auth:latest
          docker tag yash9912/task-manager-task:latest yash9912/task-manager-task:latest
          docker tag yash9912/task-manager-gateway:latest yash9912/task-manager-gateway:latest
          docker tag yash9912/task-manager-registry:latest yash9912/task-manager-registry:latest

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker images
        if: github.ref == 'refs/heads/main'
        run: |
          docker push yash9912/task-manager-auth:latest
          docker push yash9912/task-manager-task:latest
          docker push yash9912/task-manager-gateway:latest
          docker push yash9912/task-manager-registry:latest