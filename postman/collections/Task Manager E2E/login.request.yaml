$kind: http-request
name: login
url: "{{baseUrl}}/api/auth/login"
method: POST
body:
  type: json
  content: "{\r

    \  \"username\": \"{{username}}\",\r

    \  \"password\": \"{{password}}\"\r

    }"
scripts:
  - type: beforeRequest
    code: "const json = pm.response.json();\r

      \r

      pm.environment.set(\"auth_token\", json.token);\r

      \r

      pm.test(\"Login success\", function () \r

      {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      });"
    language: text/javascript
order: 4503582524205482
